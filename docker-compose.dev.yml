services:
  backend:
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3005,http://localhost:3001}

  frontend:
    build:
      context: ./frontend
      target: dev
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: "true"
    command: npm run dev -- -p 3001 -H 0.0.0.0
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  frontend_node_modules:
  frontend_next:
