services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend:/app
    env_file:
      # Opcional: solo se usa en dev local. En Dokploy las env vars
      # (SECRET_KEY, etc.) se inyectan directamente al contenedor.
      - path: ./backend/.env
        required: false
    environment:
      # Estas sobrescriben a las del .env si hace falta (paths/red de Docker).
      DATABASE_URL: sqlite:////app/data/concejo_escolar.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3005,http://localhost:3001}

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    ports:
      - "3005:3001"
    depends_on:
      - backend
