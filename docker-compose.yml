services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data

    env_file:
      # Opcional: solo se usa en dev local (archivo backend/.env).
      - path: ./backend/.env
        required: false
    environment:
      # IMPORTANTE: en Dokploy las variables de "Environment Settings" NO se
      # inyectan solas al contenedor; solo sirven para interpolar ${VAR} acá.
      # Por eso cada variable que el backend necesita se mapea explícitamente.
      SECRET_KEY: ${SECRET_KEY:?Falta SECRET_KEY - definila en las env vars (Dokploy) o en backend/.env}
      DATABASE_URL: sqlite:////app/data/concejo_escolar.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3005,http://localhost:3001}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
      # En producción con HTTPS y subdominios distintos para front y back:
      #   REFRESH_COOKIE_SECURE=true
      #   REFRESH_COOKIE_DOMAIN=.agustinmigliorero.com   (con el punto inicial)
      # Así la cookie de sesión se comparte entre sae.* y el subdominio del back.
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_DOMAIN: ${REFRESH_COOKIE_DOMAIN:-}

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    ports:
      - "3005:3001"
    depends_on:
      - backend

volumes:
  sqlite_data:
    # El nombre fijo evita que Dokploy cree otro volumen si cambia el
    # nombre del proyecto/stack entre despliegues.
    name: concejo_escolar_sqlite_data
