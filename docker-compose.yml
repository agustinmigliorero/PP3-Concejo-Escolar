services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/concejo_escolar.db
      - CORS_ORIGINS=http://localhost:3005,http://localhost:3001,http://92.113.39.212:3005,http://92.113.39.212:3001

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3005:3001"
    depends_on:
      - backend

volumes:
  sqlite_data:
