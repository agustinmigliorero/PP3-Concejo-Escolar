services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/concejo_escolar.db

  frontend:
    build: ./frontend
    ports:
      - "3005:3001"
    depends_on:
      - backend

volumes:
  sqlite_data:
